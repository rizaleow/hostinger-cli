# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: hostinger-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: hostinger-cli
    main: ./cmd/hostinger-cli
    binary: hostinger-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/rizaleow/hostinger-cli/internal/version.Version={{.Version}}
      - -X github.com/rizaleow/hostinger-cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/rizaleow/hostinger-cli/internal/version.Date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

brews:
  - name: hostinger-cli
    repository:
      owner: rizaleow
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/rizaleow/hostinger-cli
    description: Go-native CLI for the Hostinger API
    license: MIT
    install: bin.install "hostinger-cli"
    test: |
      system "#{bin}/hostinger-cli --version"

dockers:
  - image_templates:
      - "ghcr.io/rizaleow/hostinger-cli:{{ .Version }}-amd64"
      - "ghcr.io/rizaleow/hostinger-cli:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/rizaleow/hostinger-cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
  - image_templates:
      - "ghcr.io/rizaleow/hostinger-cli:{{ .Version }}-arm64"
      - "ghcr.io/rizaleow/hostinger-cli:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/rizaleow/hostinger-cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/rizaleow/hostinger-cli:{{ .Version }}-amd64"
      - "ghcr.io/rizaleow/hostinger-cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/rizaleow/hostinger-cli:latest"
    image_templates:
      - "ghcr.io/rizaleow/hostinger-cli:latest-amd64"
      - "ghcr.io/rizaleow/hostinger-cli:latest-arm64"
