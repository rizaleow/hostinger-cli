# https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  default: standard
  exclusions:
    rules:
      # Writes to stdout/stderr via fmt.F* almost never return a meaningful
      # error and are idiomatic to ignore. Don't make us write `_, _ = …`
      # at every print site.
      - linters: [errcheck]
        text: "Error return value of `fmt\\.(Fprint|Fprintf|Fprintln)` is not checked"

      # Generated client is owned upstream.
      - path: internal/api/zz_generated\.go
        linters: [all]
