name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: go vet
        run: go vet ./...
      - name: tests
        run: go test -race -count=1 ./...
      - name: build
        run: go build -trimpath ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      # Build golangci-lint from source against the runner's Go toolchain so
      # it tracks our go.mod target instead of being capped at whichever Go
      # the upstream binary release happened to be built with.
      - uses: golangci/golangci-lint-action@v9
        with:
          install-mode: goinstall
          version: v2.11.0
